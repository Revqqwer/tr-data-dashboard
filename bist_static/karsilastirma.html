<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script>
(function(){try{var t=localStorage.getItem('theme');
 if(t!=='dark'&&t!=='light'){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}
 document.documentElement.setAttribute('data-theme',t);}catch(e){}
 function ch(t){var cur=document.documentElement.getAttribute('data-theme')||'light';
  if((t==='dark'||t==='light')&&t!==cur){try{localStorage.setItem('theme',t)}catch(e){}location.reload();}}
 window.addEventListener('message',function(e){if(e&&e.data&&e.data.type==='set-theme')ch(e.data.theme);});
 window.addEventListener('storage',function(e){if(e.key==='theme'&&e.newValue)ch(e.newValue);});
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaman Dilimlerine Göre Endeks Getirileri</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html{-webkit-text-size-adjust:100%;-moz-text-size-adjust:100%;text-size-adjust:100%;}

  :root {
    --bg:      #f5f6f8;
    --surface: #ffffff;
    --border:  #e0e3e8;
    --text:    #1a1d23;
    --muted:   #6b7280;
    --accent:  #2563eb;
    --green:   #16a34a;
    --red:     #dc2626;
  }

  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 1rem; font-weight: 700; color: var(--accent); }
  .last-update { margin-left: auto; font-size: 0.7rem; color: var(--muted); }

  .sort-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem; color: var(--muted);
  }
  .sort-bar span { font-weight: 600; color: var(--text); margin-right: 4px; }
  .sort-btn {
    padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 0.72rem;
    cursor: pointer; transition: all .15s;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

  .table-wrap { overflow: auto; max-height: calc(100vh - 98px); padding: 0 20px 24px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 16px; }

  thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--surface2); color: var(--muted);
    padding: 8px 14px; text-align: right;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 2px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:first-child { text-align: left; min-width: 200px; }
  thead th:hover { color: var(--accent); }
  thead th.sort-asc::after  { content: ' ↑'; }
  thead th.sort-desc::after { content: ' ↓'; }

  tbody tr { border-bottom: 1px solid rgba(0,0,0,.06); transition: background .1s; }
  tbody tr:hover { background: rgba(37,99,235,.04); }
  tbody tr.bist100-row { background: rgba(37,99,235,.055); }
  tbody tr.bist100-row td:first-child { font-weight: 700; color: var(--accent); }

  td {
    padding: 7px 14px; text-align: right;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  td:first-child { text-align: left; font-weight: 500; color: var(--text); }

  /* ── Heatmap renklendirme ── */
  .cell-hot5  { background: #052e16; color: #fff; border-radius: 4px; }
  .cell-hot4  { background: #166534; color: #fff; border-radius: 4px; }
  .cell-hot3  { background: #16a34a; color: #fff; border-radius: 4px; }
  .cell-hot2  { background: #4ade80; color: #14532d; border-radius: 4px; }
  .cell-hot1  { background: #bbf7d0; color: #14532d; border-radius: 4px; }
  .cell-cold1 { background: #fee2e2; color: #7f1d1d; border-radius: 4px; }
  .cell-cold2 { background: #fca5a5; color: #7f1d1d; border-radius: 4px; }
  .cell-cold3 { background: #ef4444; color: #fff; border-radius: 4px; }
  .cell-cold4 { background: #b91c1c; color: #fff; border-radius: 4px; }
  .cell-cold5 { background: #7f1d1d; color: #fff; border-radius: 4px; }
  .cell-zero  { background: var(--surface2); color: var(--muted); border-radius: 4px; }
  .cell-na    { color: #d1d5db; }

  .pct-val { display: inline-block; padding: 2px 6px; font-size: 0.78rem; font-weight: 600; }

  .spinner {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    height: calc(100vh - 98px); font-size: 0.85rem; color: var(--muted);
  }
  .spin {
    width: 24px; height: 24px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: rot .8s linear infinite;
  }
  @keyframes rot { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Mobil uyumluluk ── */
  @media (max-width: 768px) {
    header { padding: 8px 12px; gap: 6px; }
    header h1 { font-size: 0.82rem; }
    .last-update { font-size: 0.62rem; margin-left: 0; }
    .sort-bar { padding: 7px 12px; font-size: 0.7rem; flex-wrap: wrap; gap: 5px; }
    .sort-btn { padding: 2px 8px; font-size: 0.68rem; }
    .table-wrap {
      padding: 0 8px 16px;
      max-height: calc(100vh - 82px);
      -webkit-overflow-scrolling: touch;   /* iOS'ta akici yatay kaydirma */
    }
    table { font-size: 0.7rem; margin-top: 10px; width: auto; }
    /* Donem sutunlarini sikistir ki ekrana daha fazlasi sigsin */
    thead th { padding: 5px 6px; font-size: 0.62rem; min-width: 0 !important; }
    td { padding: 6px 6px !important; }

    /* Endeks adi sutunu sabit kalsin: 7 donem sutunu ekrana sigmiyor, yatay
       kaydirirken hangi endekse baktigin kaybolmasin.
       AYRICA genisligi sinirla — "BIST KIMYA PETROL PLASTIK" gibi uzun adlar
       tek satirda sigmak icin sutunu ekranin yarisindan fazlasina cikariyordu;
       artik 2 satira sariyor. */
    thead th:first-child,
    tbody td:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      background: var(--surface);
      width: 116px !important;
      min-width: 116px !important;
      max-width: 116px !important;
      white-space: normal !important;
      word-break: break-word;
      line-height: 1.25;
      box-shadow: 1px 0 0 var(--border);
    }
    thead th:first-child { z-index: 4; }
    td { padding: 5px 8px; }
    .pct-val { padding: 2px 4px; font-size: 0.68rem; }
  }
</style>
<style>
  :root { --surface2: #f8f9fc; }
  :root[data-theme="dark"] {
    --bg:#0b0f17; --surface:#141a24; --surface2:#1b222e; --border:#2a3340;
    --text:#e6edf5; --muted:#7f8b9c; --accent:#5b8cff; --green:#34d399; --red:#f87171;
    color-scheme: dark;
  }
</style>
</head>
<body>

<header>
  <h1>📊 Zaman Dilimlerine Göre Endeks Getirileri</h1>
  <div class="last-update" id="lastUpdate">Yükleniyor…</div>
</header>

<div class="sort-bar">
  <span>Sırala:</span>
  <button class="sort-btn active" data-col="name">Endeks</button>
  <button class="sort-btn" data-col="1a">1A</button>
  <button class="sort-btn" data-col="3a">3A</button>
  <button class="sort-btn" data-col="6a">6A</button>
  <button class="sort-btn" data-col="1y">1Y</button>
  <button class="sort-btn" data-col="3y">3Y</button>
  <button class="sort-btn" data-col="5y">5Y</button>
</div>

<div id="content">
  <div class="spinner"><div class="spin"></div>Veriler yükleniyor…</div>
</div>

<script>
const PERIODS = ['1a','3a','6a','1y','3y','5y'];
const PERIOD_LABELS = {'1a':'1 Ay','3a':'3 Ay','6a':'6 Ay','1y':'1 Yıl','3y':'3 Yıl','5y':'5 Yıl'};
const FAIZ_NAME = 'FAİZ (TLREF)';
const STOPAJ    = 0.175;

let summaryData = null;
let sortCol = 'name';
let sortDir = 1;  // 1 = asc, -1 = desc

// ── Renk sınıfı ──
function heatClass(pct) {
  if (pct === null || pct === undefined) return 'cell-na';
  if (Math.abs(pct) < 0.5) return 'cell-zero';
  if (pct >  80) return 'cell-hot5';
  if (pct >  40) return 'cell-hot4';
  if (pct >  15) return 'cell-hot3';
  if (pct >   5) return 'cell-hot2';
  if (pct >   0) return 'cell-hot1';
  if (pct > -5)  return 'cell-cold1';
  if (pct > -15) return 'cell-cold2';
  if (pct > -30) return 'cell-cold3';
  if (pct > -50) return 'cell-cold4';
  return 'cell-cold5';
}

function fmtPct(v) {
  if (v === null || v === undefined) return '<span class="cell-na">—</span>';
  const cls = heatClass(v);
  const sign = v > 0 ? '+' : '';
  return `<span class="pct-val ${cls}">${sign}${v.toFixed(1)}%</span>`;
}

function render() {
  if (!summaryData) return;
  const { periods, data } = summaryData;

  // Satırları oluştur
  let rows = Object.entries(data).map(([name, vals]) => ({ name, ...vals }));

  // Sırala
  rows.sort((a, b) => {
    if (sortCol === 'name') {
      return sortDir * a.name.localeCompare(b.name, 'tr');
    }
    const av = a[sortCol] ?? -9999;
    const bv = b[sortCol] ?? -9999;
    return sortDir * (av - bv);
  });

  const allPeriods = PERIODS.filter(p => periods.includes(p));

  let html = `
  <div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="name">Endeks</th>
        ${allPeriods.map(p => `<th data-col="${p}">${PERIOD_LABELS[p]}</th>`).join('')}
      </tr>
    </thead>
    <tbody>
  `;

  for (const row of rows) {
    const isBist100 = row.name === 'BIST 100';
    const isFaiz    = row.name === FAIZ_NAME;
    const nameCell  = isFaiz
      ? `${row.name} <span style="font-size:0.65rem;color:#f97316;font-weight:600">(net, -%17.5 stopaj)</span>`
      : row.name;
    html += `<tr class="${isBist100 ? 'bist100-row' : ''}" ${isFaiz ? 'style="background:rgba(249,115,22,.06)"' : ''}>
      <td>${nameCell}</td>
      ${allPeriods.map(p => `<td>${fmtPct(row[p])}</td>`).join('')}
    </tr>`;
  }

  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;

  // Sütun başlıklarına sort listener ekle
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const col = th.dataset.col;
    if (col === sortCol) {
      th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    }
    th.addEventListener('click', () => {
      if (sortCol === col) {
        sortDir *= -1;
      } else {
        sortCol = col;
        sortDir = col === 'name' ? 1 : -1;
      }
      document.querySelectorAll('.sort-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.col === sortCol);
      });
      render();
    });
  });
}

// ── Sırala butonları ──
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const col = btn.dataset.col;
    if (sortCol === col) {
      sortDir *= -1;
    } else {
      sortCol = col;
      sortDir = col === 'name' ? 1 : -1;
    }
    document.querySelectorAll('.sort-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.col === sortCol));
    render();
  });
});

// ── Veri çek ──
async function load() {
  try {
    const res = await fetch('/bist/api/returns-summary');
    const json = await res.json();
    if (json._loading) {
      document.getElementById('lastUpdate').textContent = '⚠ Veriler henüz hazır değil';
      document.getElementById('content').innerHTML =
        '<div class="spinner" style="flex-direction:column;gap:8px">' +
        '<div class="spin"></div>' +
        '<span>Veriler hazırlanıyor… <code>collect_bist.py</code> çalıştırın.</span>' +
        '</div>';
      return;
    }
    // FAİZ için stopaj uygula
    if (json.data && json.data[FAIZ_NAME]) {
      const faiz = json.data[FAIZ_NAME];
      json.data[FAIZ_NAME] = Object.fromEntries(
        Object.entries(faiz).map(([k, v]) => [k, v != null ? +(v * (1 - STOPAJ)).toFixed(2) : v])
      );
    }
    summaryData = json;

    // Son güncelleme zamanını bul
    const allPcts = Object.values(json.data || {}).flatMap(v => Object.values(v));
    document.getElementById('lastUpdate').textContent =
      `${Object.keys(json.data || {}).length} endeks · ${json.periods?.length || 0} dönem`;

    render();
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="spinner">Veri yüklenemedi: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
