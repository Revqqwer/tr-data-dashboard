<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script>
(function(){try{var t=localStorage.getItem('theme');
 if(t!=='dark'&&t!=='light'){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}
 document.documentElement.setAttribute('data-theme',t);}catch(e){}
 function ch(t){var cur=document.documentElement.getAttribute('data-theme')||'light';
  if((t==='dark'||t==='light')&&t!==cur){try{localStorage.setItem('theme',t)}catch(e){}location.reload();}}
 window.addEventListener('message',function(e){if(e&&e.data&&e.data.type==='set-theme')ch(e.data.theme);});
 window.addEventListener('storage',function(e){if(e.key==='theme'&&e.newValue)ch(e.newValue);});
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST Endeks Getiri Takibi</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #f5f6f8;
    --surface: #ffffff;
    --border:  #e0e3e8;
    --text:    #1a1d23;
    --muted:   #6b7280;
    --accent:  #2563eb;
    --green:   #16a34a;
    --red:     #dc2626;
  }

  html, body { height: 100%; min-height: 100%; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow-y: auto; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  header h1 { font-size: 1rem; font-weight: 700; color: var(--accent); }
  .period-bar { display: flex; gap: 4px; margin-left: 16px; }
  .period-btn {
    padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 0.75rem;
    cursor: pointer; transition: all .15s;
  }
  .period-btn:hover { border-color: var(--accent); color: var(--accent); }
  .period-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .period-btn.custom-active { background: #7c3aed; color: #fff; border-color: #7c3aed; font-weight: 700; }
  .last-update { margin-left: auto; font-size: 0.7rem; color: var(--muted); }

  /* ── Özel tarih seçici ── */
  .custom-bar {
    display: none; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 7px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface2); flex-shrink: 0;
  }
  .custom-bar.show { display: flex; }
  .custom-bar label { font-size: 0.72rem; color: var(--muted); font-weight: 600; }
  .custom-bar input[type=date] {
    padding: 4px 9px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.78rem; background: var(--surface); color: var(--text);
    outline: none; cursor: pointer; transition: border-color .15s;
  }
  .custom-bar input[type=date]:focus { border-color: var(--accent); }
  .custom-bar .apply-btn {
    padding: 4px 14px; border-radius: 6px; border: none;
    background: #7c3aed; color: #fff; font-size: 0.75rem; font-weight: 700;
    cursor: pointer; transition: background .15s;
  }
  .custom-bar .apply-btn:hover { background: #6d28d9; }
  .custom-bar .sep { color: var(--muted); font-size: 0.8rem; }

  /* ── Body layout ── */
  .body-wrap {
    display: grid;
    grid-template-columns: 230px 1fr;
    height: calc(100vh - 53px);
    min-height: 420px;
    flex-shrink: 0;
    overflow: hidden;
    transition: height .15s;
  }
  .body-wrap.with-custom { height: calc(100vh - 53px - 42px); }

  /* ── Sidebar ── */
  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-hdr {
    padding: 10px 14px; font-size: 0.72rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .sidebar-list { overflow-y: auto; flex: 1; }

  .idx-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
    font-size: 0.8rem;
  }
  .idx-item:hover { background: rgba(0,0,0,.04); }
  .idx-item.active { background: rgba(37,99,235,.07); border-left-color: var(--accent); }
  .idx-item.dim { opacity: .3; }
  .idx-item.bist100 { background: rgba(37,99,235,.06); border-left-color: var(--accent) !important; }
  .idx-item.bist100 .idx-name { font-weight: 700; color: var(--accent); }
  .idx-item.bist100 .idx-pct  { font-size: 0.82rem; }

  .idx-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    cursor: pointer; transition: transform .1s;
  }
  .idx-dot:hover { transform: scale(1.35); }
  .idx-name { flex: 1; line-height: 1.3; }
  .idx-pct { font-size: 0.75rem; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 54px; text-align: right; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* ── Right column ── */
  .right-col { display: flex; flex-direction: column; overflow: hidden; }

  /* ── Chart ── */
  .chart-wrap { flex: 1; position: relative; min-height: 0; padding: 10px 14px 6px; }
  canvas { display: block; }

  .spinner-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(245,246,248,.85); z-index: 10;
    align-items: center; justify-content: center; flex-direction: column; gap: 10px;
    font-size: 0.82rem; color: var(--muted);
  }
  .spinner-overlay.show { display: flex; }
  .spin {
    width: 26px; height: 26px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: rot .8s linear infinite;
  }
  @keyframes rot { to { transform: rotate(360deg); } }

  /* ── Stocks panel ── */
  .stocks-panel { border-top: 1px solid var(--border); height: 260px; display: flex; flex-direction: column; flex-shrink: 0; }
  .stocks-hdr {
    padding: 8px 16px; font-size: 0.8rem; font-weight: 600;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .stocks-hdr small { color: var(--muted); font-weight: 400; font-size: 0.72rem; }
  .stocks-body { overflow-y: auto; flex: 1; }
  .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 0.85rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead th {
    position: sticky; top: 0; z-index: 1; background: var(--surface);
    color: var(--muted); padding: 5px 12px; text-align: left;
    font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
    cursor: pointer; user-select: none; border-bottom: 1px solid var(--border);
  }
  thead th:hover { color: var(--text); }
  tbody tr { border-bottom: 1px solid rgba(0,0,0,.07); }
  tbody tr:hover { background: rgba(37,99,235,.04); }
  td { padding: 5px 12px; }
  .td-right { text-align: right; font-variant-numeric: tabular-nums; }
  .td-bar { width: 90px; }
  .bar-bg { height: 6px; background: rgba(0,0,0,.08); border-radius: 3px; overflow: hidden; }
  .bar-fg { height: 100%; border-radius: 3px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Mobil uyumluluk ── */
  @media (max-width: 768px) {
    header { padding: 8px 12px; gap: 6px; }
    header h1 { font-size: 0.82rem; }
    .period-bar { margin-left: 0; gap: 3px; flex-wrap: wrap; }
    .period-btn { padding: 3px 7px; font-size: 0.68rem; }
    .last-update { font-size: 0.62rem; margin-left: 0; width: 100%; }

    .custom-bar { padding: 6px 12px; gap: 6px; }
    .custom-bar input[type=date] { padding: 3px 7px; font-size: 0.72rem; }
    .custom-bar .apply-btn { padding: 3px 10px; font-size: 0.7rem; }

    /* Stack: index list on top, chart+stocks below */
    .body-wrap {
      grid-template-columns: 1fr !important;
      grid-template-rows: 170px 1fr !important;
      height: calc(100vh - 48px) !important;
      overflow: hidden;
    }
    .body-wrap.with-custom {
      height: calc(100vh - 48px - 40px) !important;
    }

    /* Sidebar becomes a compact list (left column → top row) */
    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      height: 170px;
    }
    .sidebar-hdr { padding: 6px 10px; font-size: 0.65rem; }
    .idx-item { padding: 5px 10px; font-size: 0.75rem; }
    .idx-pct { font-size: 0.7rem; min-width: 46px; }
    .idx-dot { width: 8px; height: 8px; }

    /* Right column */
    .right-col { overflow: hidden; }
    .chart-wrap { padding: 6px 8px 4px; }

    /* Stocks panel smaller */
    .stocks-panel { height: 200px; }
    .stocks-hdr { padding: 6px 10px; font-size: 0.75rem; }
    table { font-size: 0.72rem; }
    td { padding: 4px 8px; }
    thead th { padding: 4px 8px; font-size: 0.65rem; }
    .td-bar { width: 60px; }
  }
</style>
<style>
  :root { --surface2: #f8f9fc; }
  :root[data-theme="dark"] {
    --bg:#0b0f17; --surface:#141a24; --surface2:#1b222e; --border:#2a3340;
    --text:#e6edf5; --muted:#7f8b9c; --accent:#5b8cff; --green:#34d399; --red:#f87171;
    color-scheme: dark;
  }
</style>
</head>
<body>

<header>
  <h1>📈 BIST Endeks Getiri Takibi</h1>
  <div class="period-bar" id="periodBar">
    <button class="period-btn" data-p="1h">1H</button>
    <button class="period-btn" data-p="1a">1A</button>
    <button class="period-btn" data-p="3a">3A</button>
    <button class="period-btn" data-p="6a">6A</button>
    <button class="period-btn active" data-p="1y">1Y</button>
    <button class="period-btn" data-p="3y">3Y</button>
    <button class="period-btn" data-p="5y">5Y</button>
    <button class="period-btn" data-p="custom" id="customBtn">Özel</button>
  </div>
  <div class="last-update" id="lastUpdate">Yükleniyor…</div>
</header>

<!-- Özel tarih seçici satırı -->
<div class="custom-bar" id="customBar">
  <label>Başlangıç</label>
  <input type="date" id="customStart" />
  <span class="sep">→</span>
  <label>Bitiş</label>
  <input type="date" id="customEnd" />
  <button class="apply-btn" onclick="applyCustom()">Uygula</button>
  <span id="customMsg" style="font-size:0.72rem;color:var(--muted);margin-left:4px;"></span>
</div>

<div class="body-wrap">

  <!-- Sidebar: endeks listesi + getiri -->
  <aside class="sidebar">
    <div class="sidebar-hdr">
      Endeksler
      <span id="visCount" style="font-weight:400"></span>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- Sağ: grafik + hisse paneli -->
  <div class="right-col">

    <div class="chart-wrap">
      <canvas id="mainChart"></canvas>
      <div class="spinner-overlay" id="spinner">
        <div class="spin"></div>
        <span>Veriler çekiliyor…</span>
      </div>
    </div>

    <div class="stocks-panel">
      <div class="stocks-hdr" id="stocksHdr">
        Hisse Detayı
        <small id="stocksSub">— Sol listeden bir endekse tıklayın</small>
      </div>
      <div class="stocks-body" id="stocksBody">
        <div class="placeholder">Endeks seçin</div>
      </div>
    </div>

  </div>
</div>

<script>
// ─── Renk paleti (33 endeks) ─────────────────────────────────────────────────
const PALETTE = [
  '#58a6ff','#3fb950','#f85149','#d29922','#a371f7',
  '#ffa657','#4fc3f7','#ff6b6b','#26c6da','#ff9800',
  '#e91e63','#00bcd4','#8bc34a','#ff5722','#9c27b0',
  '#00e5ff','#76ff03','#ff4081','#ffea00','#1de9b6',
  '#f06292','#aed581','#4dd0e1','#ffb74d','#ce93d8',
  '#80cbc4','#ef9a9a','#fff176','#b39ddb','#a5d6a7',
  '#f48fb1','#80deea','#ffcc80',
];

// ─── FAİZ sabiti ─────────────────────────────────────────────────────────────
const FAIZ_NAME  = 'FAİZ (TLREF)';
const FAIZ_COLOR = '#f97316';   // turuncu — her zaman bu renk

// ─── State ───────────────────────────────────────────────────────────────────
let period          = '1y';
let histData        = {};
let hidden          = new Set();
let activeIdx       = null;
let chart           = null;
let colorMap        = { [FAIZ_NAME]: FAIZ_COLOR };   // FAİZ rengi sabit
let stocksData      = [];
let sortCol         = 'pct';
let sortAsc         = false;
let isCustomMode    = false;   // Özel tarih modu aktif mi?
let customStartDate = '';
let customEndDate   = '';

// ─── Chart ───────────────────────────────────────────────────────────────────
const ctx = document.getElementById('mainChart').getContext('2d');

function buildChart(data) {
  const names = Object.keys(data);
  names.forEach((n, i) => { if (!colorMap[n]) colorMap[n] = PALETTE[i % PALETTE.length]; });

  const allDates = [...new Set(names.flatMap(n => data[n].dates))].sort();

  const datasets = names.map(name => {
    const isFaiz = name === FAIZ_NAME;
    const d = data[name], map = {};
    d.dates.forEach((dt, i) => map[dt] = d.values[i]);
    return {
      label:           name,
      data:            allDates.map(dt => ({ x: dt, y: map[dt] ?? null })),
      borderColor:     colorMap[name],
      backgroundColor: colorMap[name] + '18',
      borderWidth:     isFaiz ? 2.5 : (name === 'BIST 100' ? 3.5 : 1.8),
      borderDash:      isFaiz ? [7, 4] : [],
      pointRadius:     0,
      pointHoverRadius:3,
      tension:         0.2,
      hidden:          hidden.has(name),
      spanGaps:        true,
      order:           isFaiz ? 0 : (name === 'BIST 100' ? 1 : 2),
    };
  });

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display:  true,
          position: 'bottom',
          onClick: (_e, legendItem) => {
            const name = chart.data.datasets[legendItem.datasetIndex].label;
            toggleIdx(name);
          },
          labels: {
            boxWidth:  10,
            boxHeight: 10,
            padding:   10,
            font: { size: 10 },
            color: '#6b7280',
            generateLabels: (ch) => ch.data.datasets.map((ds, i) => ({
              text:        ds.label.replace('BIST ', ''),
              fillStyle:   ds.borderColor,
              strokeStyle: ds.borderColor,
              lineWidth:   2,
              hidden:      !!ds.hidden,
              datasetIndex: i,
            })),
          },
        },
        tooltip: {
          itemSort: (a, b) => (b.raw?.y ?? -Infinity) - (a.raw?.y ?? -Infinity),
          callbacks: {
            label: c => {
              const v = c.raw?.y;
              if (v == null) return null;
              const p = (v - 100).toFixed(2);
              const lbl = c.dataset.label === FAIZ_NAME ? '📊 FAİZ' : c.dataset.label;
              return ` ${lbl}: ${p >= 0 ? '+' : ''}${p}%`;
            }
          }
        }
      },
      scales: {
        x: {
          type:  'time',
          time:  { tooltipFormat: 'dd MMM yyyy' },
          ticks: { color: '#8b949e', maxTicksLimit: 10, font: { size: 10 } },
          grid:  { color: 'rgba(0,0,0,.08)' },
        },
        y: {
          ticks: {
            color: '#6b7280', font: { size: 10 },
            callback: v => (v - 100).toFixed(0) + '%',
          },
          grid:  { color: 'rgba(0,0,0,.08)' },
        }
      }
    }
  });
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function renderSidebar(data) {
  // FAİZ'i endeks listesinden ayır, endeksleri pct'ye göre sırala
  const faizData  = data[FAIZ_NAME];
  const idxNames  = Object.keys(data)
    .filter(n => n !== FAIZ_NAME)
    .sort((a, b) => (data[b].pct ?? -9999) - (data[a].pct ?? -9999));
  const list = document.getElementById('sidebarList');

  function itemHtml(name, extraCls = '') {
    const d    = data[name];
    const pct  = d.pct;
    const sign = pct >= 0 ? '+' : '';
    const cls  = pct >= 0 ? 'pos' : 'neg';
    const dim  = hidden.has(name) ? 'dim' : '';
    const act  = activeIdx === name ? 'active' : '';
    const b100 = name === 'BIST 100' ? 'bist100' : '';
    const col  = colorMap[name] || '#6b7280';
    return `
      <div class="idx-item ${dim} ${act} ${b100} ${extraCls}" data-name="${name}">
        <span class="idx-dot" data-dot="${name}" style="background:${col}" title="Grafikte göster/gizle"></span>
        <span class="idx-name">${name}${name === FAIZ_NAME ? ' <span style="font-size:0.65rem;color:var(--muted)">(net)</span>' : ''}</span>
        <span class="idx-pct ${cls}">${sign}${pct != null ? pct.toFixed(2) : '—'}%</span>
      </div>`;
  }

  // FAİZ en üstte sabit, altında ince ayırıcı, sonra endeksler
  const faizHtml = faizData ? itemHtml(FAIZ_NAME) +
    '<div style="height:1px;background:rgba(0,0,0,.1);margin:4px 8px 2px"></div>' : '';

  list.innerHTML = faizHtml + idxNames.map(n => itemHtml(n)).join('');

  list.querySelectorAll('.idx-item').forEach(el => {
    el.addEventListener('click', e => {
      const name = el.dataset.name;
      if (e.target.dataset.dot) {
        toggleIdx(name);
      } else {
        selectIdx(name);
      }
    });
  });

  const vis = Object.keys(data).length - hidden.size;
  document.getElementById('visCount').textContent = `${vis}/${Object.keys(data).length}`;
}

// ─── Toggle ───────────────────────────────────────────────────────────────────
function toggleIdx(name) {
  if (hidden.has(name)) hidden.delete(name);
  else hidden.add(name);

  if (chart) {
    const ds = chart.data.datasets.find(d => d.label === name);
    if (ds) { ds.hidden = hidden.has(name); chart.update(); }
  }
  renderSidebar(histData);
}

// ─── Endeks seç ───────────────────────────────────────────────────────────────
function selectIdx(name) {
  activeIdx = name;
  renderSidebar(histData);
  if (name === FAIZ_NAME) {
    document.getElementById('stocksHdr').innerHTML = '📊 FAİZ (TLREF) <small>— BIST Referans Faiz Oranı</small>';
    document.getElementById('stocksBody').innerHTML =
      '<div class="placeholder" style="flex-direction:column;gap:6px;text-align:center">' +
      '<span style="font-size:1.4rem">📊</span>' +
      '<span>Faiz oranı için hisse listesi gösterilmez.</span>' +
      '<span style="font-size:0.72rem;color:var(--muted)">Grafikteki turuncu kesik çizgi TLREF referans faizini temsil eder.</span>' +
      '</div>';
  } else {
    loadStocks(name);
  }
}

// ─── Stopaj (%17.5) ──────────────────────────────────────────────────────────
const STOPAJ = 0.175;

function applyStopaj(data) {
  if (!data[FAIZ_NAME]) return data;
  const faiz = data[FAIZ_NAME];
  data[FAIZ_NAME] = {
    ...faiz,
    values: faiz.values.map(v => +(100 + (v - 100) * (1 - STOPAJ)).toFixed(2)),
    pct:    +(faiz.pct * (1 - STOPAJ)).toFixed(2),
  };
  return data;
}

// ─── History fetch ────────────────────────────────────────────────────────────
async function loadHistory(p) {
  document.getElementById('spinner').classList.add('show');
  try {
    const res  = await fetch(`/bist/api/history?period=${p}`);
    const json = await res.json();

    if (json._loading) {
      // DB henüz boş — collect_bist.py çalışmamış
      document.getElementById('spinner').classList.remove('show');
      document.getElementById('lastUpdate').textContent = '⚠ Veriler henüz hazır değil';
      document.getElementById('sidebarList').innerHTML =
        '<div style="padding:16px;font-size:0.78rem;color:#6b7280;line-height:1.6">' +
        'Veriler hazırlanıyor…<br>PA\'da <code>collect_bist.py</code> çalıştırın.' +
        '</div>';
      return;
    }

    histData = applyStopaj(json);
    buildChart(histData);
    renderSidebar(histData);
    document.getElementById('lastUpdate').textContent =
      'Güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
    if (activeIdx && histData[activeIdx]) loadStocks(activeIdx);
  } catch(e) { console.error(e); }
  finally { document.getElementById('spinner').classList.remove('show'); }
}

// ─── Stocks fetch ─────────────────────────────────────────────────────────────
async function loadStocks(name) {
  document.getElementById('stocksHdr').innerHTML =
    `${name} <small id="stocksSub">Yükleniyor…</small>`;
  document.getElementById('stocksBody').innerHTML =
    '<div class="placeholder"><div class="spin" style="border-top-color:#2563eb"></div></div>';

  let url;
  if (isCustomMode && customStartDate && customEndDate) {
    url = `/bist/api/stocks?index=${encodeURIComponent(name)}&start=${customStartDate}&end=${customEndDate}`;
  } else {
    url = `/bist/api/stocks?index=${encodeURIComponent(name)}&period=${period}`;
  }

  try {
    const res  = await fetch(url);
    const json = await res.json();
    if (!Array.isArray(json)) {
      // Sunucu hata objesi döndü (endeks Excel'de yok vb.)
      const msg = json.error || 'Bu endeks için hisse verisi bulunamadı';
      document.getElementById('stocksHdr').innerHTML =
        `${name} <small id="stocksSub">— veri yok</small>`;
      document.getElementById('stocksBody').innerHTML =
        `<div class="placeholder" style="flex-direction:column;gap:6px;text-align:center;padding:20px">
          <span style="font-size:1.2rem">📋</span>
          <span style="font-size:0.82rem;color:var(--muted)">${msg}</span>
         </div>`;
      return;
    }
    stocksData = json;
    renderStocks(name);
  } catch(e) {
    document.getElementById('stocksBody').innerHTML =
      `<div class="placeholder" style="flex-direction:column;gap:4px">
        <span>Veri çekilemedi</span>
        <span style="font-size:0.72rem;color:var(--muted)">${e.message}</span>
       </div>`;
  }
}

function renderStocks(name) {
  const sorted = [...stocksData].sort((a, b) => {
    const va = typeof a[sortCol] === 'string' ? a[sortCol] : (a[sortCol] ?? -9999);
    const vb = typeof b[sortCol] === 'string' ? b[sortCol] : (b[sortCol] ?? -9999);
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  const maxAbs = Math.max(...sorted.map(s => Math.abs(s.pct ?? 0)), 1);

  const periodLabel = isCustomMode
    ? `${customStartDate} → ${customEndDate}`
    : period.toUpperCase();
  document.getElementById('stocksHdr').innerHTML =
    `${name} <small id="stocksSub">— ${sorted.length} hisse · ${periodLabel}</small>`;

  document.getElementById('stocksBody').innerHTML = `
    <table>
      <thead><tr>
        <th data-col="kod">Kod</th>
        <th data-col="ad">Şirket</th>
        <th data-col="price" class="td-right">Fiyat</th>
        <th data-col="pct"   class="td-right">Getiri</th>
        <th class="td-bar">Performans</th>
      </tr></thead>
      <tbody>
        ${sorted.map(s => {
          const pct    = s.pct;
          const cls    = pct == null ? '' : pct >= 0 ? 'pos' : 'neg';
          const sign   = pct != null && pct >= 0 ? '+' : '';
          const pctTxt = pct != null ? `${sign}${pct.toFixed(2)}%` : '—';
          const barW   = pct != null ? (Math.abs(pct) / maxAbs * 100).toFixed(1) : 0;
          const barClr = pct == null ? '#555' : pct >= 0 ? 'var(--green)' : 'var(--red)';
          return `<tr>
            <td><strong>${s.kod}</strong></td>
            <td style="color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.ad}</td>
            <td class="td-right">${s.price != null ? s.price.toLocaleString('tr-TR') : '—'}</td>
            <td class="td-right ${cls}" style="font-weight:700">${pctTxt}</td>
            <td class="td-bar"><div class="bar-bg"><div class="bar-fg" style="width:${barW}%;background:${barClr}"></div></div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = col !== 'pct'; }
      renderStocks(name);
    });
  });
}

// ─── Period butonları ─────────────────────────────────────────────────────────
document.getElementById('periodBar').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;

  const isCustom = btn.dataset.p === 'custom';

  // Tüm butonlardan active / custom-active kaldır
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.remove('active');
    b.classList.remove('custom-active');
  });

  const customBar  = document.getElementById('customBar');
  const bodyWrap   = document.querySelector('.body-wrap');

  if (isCustom) {
    btn.classList.add('custom-active');
    customBar.classList.add('show');
    bodyWrap.classList.add('with-custom');
    // Tarihleri doldurmamışsa varsayılan koy: son 90 gün
    if (!document.getElementById('customStart').value) {
      const today = new Date();
      const ago90 = new Date(today); ago90.setDate(today.getDate() - 90);
      document.getElementById('customEnd').value   = today.toISOString().slice(0, 10);
      document.getElementById('customStart').value = ago90.toISOString().slice(0, 10);
    }
  } else {
    btn.classList.add('active');
    customBar.classList.remove('show');
    bodyWrap.classList.remove('with-custom');
    isCustomMode    = false;
    customStartDate = '';
    customEndDate   = '';
    period = btn.dataset.p;
    loadHistory(period);
  }
});

// ─── Özel tarih: uygula ───────────────────────────────────────────────────────
function applyCustom() {
  const start = document.getElementById('customStart').value;
  const end   = document.getElementById('customEnd').value;
  const msg   = document.getElementById('customMsg');

  if (!start || !end) { msg.textContent = '⚠ Tarih seçin'; return; }
  if (start >= end)   { msg.textContent = '⚠ Başlangıç bitiş tarihinden önce olmalı'; return; }

  msg.textContent = '';
  isCustomMode    = true;
  customStartDate = start;
  customEndDate   = end;
  loadHistoryCustom(start, end);
}

async function loadHistoryCustom(start, end) {
  document.getElementById('spinner').classList.add('show');
  document.getElementById('lastUpdate').textContent = 'Yükleniyor…';
  try {
    const res  = await fetch(`/bist/api/history/custom?start=${start}&end=${end}`);
    const json = await res.json();

    if (json._loading) {
      document.getElementById('spinner').classList.remove('show');
      document.getElementById('lastUpdate').textContent = '⚠ Veriler henüz hazır değil';
      return;
    }
    if (json._empty) {
      document.getElementById('spinner').classList.remove('show');
      document.getElementById('lastUpdate').textContent = '⚠ ' + (json.message || 'Veri yok');
      document.getElementById('customMsg').textContent  = '⚠ Seçilen aralıkta veri bulunamadı';
      return;
    }
    if (json.error) {
      document.getElementById('spinner').classList.remove('show');
      document.getElementById('customMsg').textContent = '⚠ ' + json.error;
      return;
    }

    histData = applyStopaj(json);
    buildChart(histData);
    renderSidebar(histData);
    document.getElementById('lastUpdate').textContent =
      `${start} → ${end} · Güncelleme: ` + new Date().toLocaleTimeString('tr-TR');
    document.getElementById('customMsg').textContent = '';
    if (activeIdx && histData[activeIdx]) loadStocks(activeIdx);
  } catch(e) {
    document.getElementById('customMsg').textContent = '⚠ ' + e.message;
    console.error(e);
  } finally {
    document.getElementById('spinner').classList.remove('show');
  }
}

// ─── Enter tuşu ile de Uygula ─────────────────────────────────────────────────
['customStart', 'customEnd'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') applyCustom();
  });
});

// ─── Başlat ───────────────────────────────────────────────────────────────────
loadHistory(period);
</script>
</body>
</html>
