<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boyut Karşılaştırma</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e2e8f0; font-family: 'Inter', sans-serif; padding: 40px 32px; }

  h2 { font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
       color: rgba(255,255,255,.3); margin-bottom: 18px; margin-top: 44px; }
  h2:first-of-type { margin-top: 0; }

  .row { display: flex; gap: 0; align-items: center; }
  .col { flex: 1; padding: 24px 28px; }
  .label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
           color: rgba(255,255,255,.25); margin-bottom: 14px; }
  .divider { width: 1px; background: rgba(255,255,255,.07); align-self: stretch; }

  /* LOGO ÖNCE */
  .logo-b { display:flex;align-items:center;gap:10px; }
  .mark-b { width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);
            display:flex;align-items:center;justify-content:center;
            font-size:13px;font-weight:700;color:#fff; }
  .name-b { font-size:14px;font-weight:600;color:#fff; }
  .name-b span { color:#f0b429; }

  /* LOGO SONRA */
  .logo-a { display:flex;align-items:center;gap:10px; }
  .mark-a { width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);
            display:flex;align-items:center;justify-content:center;
            font-size:16px;font-weight:700;color:#fff; }
  .name-a { font-size:17px;font-weight:600;color:#fff; }
  .name-a span { color:#f0b429; }

  /* NAV BUTON */
  .btn-b { padding:8px 20px;border-radius:999px;font-size:12px;font-weight:600;
           border:1px solid rgba(255,255,255,.4);color:#fff;
           letter-spacing:.04em;text-transform:uppercase;display:inline-block; }
  .btn-a { padding:10px 28px;border-radius:999px;font-size:14px;font-weight:600;
           border:1px solid rgba(255,255,255,.4);color:#fff;
           letter-spacing:.04em;text-transform:uppercase;display:inline-block; }

  /* SOSYAL */
  .sw { display:flex;gap:7px;flex-wrap:wrap; }
  .sb-b { display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:7px;
          border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.4);
          color:rgba(255,255,255,.75);font-size:13px;font-weight:600; }
  .sb-a { display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:8px;
          border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.4);
          color:rgba(255,255,255,.75);font-size:15px;font-weight:600; }

  /* ÜYE OL */
  .uo-b { display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
          letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5); }
  .uo-a { display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:600;
          letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65); }
</style>
</head>
<body>

<h2>Logo</h2>
<div class="row">
  <div class="col">
    <div class="label">Önce</div>
    <div class="logo-b"><div class="mark-b">3N</div><span class="name-b">3N<span>Finans</span></span></div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="label">Sonra</div>
    <div class="logo-a"><div class="mark-a">3N</div><span class="name-a">3N<span>Finans</span></span></div>
  </div>
</div>

<h2>Ücretsiz Üye Ol Butonu</h2>
<div class="row">
  <div class="col">
    <div class="label">Önce</div>
    <span class="btn-b">Ücretsiz Üye Ol</span>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="label">Sonra</div>
    <span class="btn-a">Ücretsiz Üye Ol</span>
  </div>
</div>

<h2>Sosyal Butonlar</h2>
<div style="padding:0 28px 24px;">
  <div class="label" style="padding-top:8px;">Önce</div>

  </div>
  <div class="label">Sonra</div>
  <div class="sw" style="margin-top:14px;">
    <span class="sb-a"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>@3nfinans</span>

    <span class="sb-a"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>LinkedIn — Hasan</span>
  </div>
</div>

<h2>Üye Ol → Linki</h2>
<div class="row">
  <div class="col">
    <div class="label">Önce</div>
    <span class="uo-b">Üye Ol <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></span>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="label">Sonra</div>
    <span class="uo-a">Üye Ol <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></span>
  </div>
</div>

</body>
</html>
