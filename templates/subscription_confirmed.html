<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>3N Finans — Abonelik Onaylandı</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050a14;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:rgba(8,14,28,.95);border:1px solid rgba(240,180,41,.18);
          border-radius:18px;padding:48px 52px;width:420px;text-align:center;
          box-shadow:0 24px 64px rgba(0,0,0,.55)}
    .icon{font-size:52px;margin-bottom:16px}
    h1{font-size:22px;font-weight:800;color:#f0b429;margin-bottom:12px}
    p{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:24px}
    .btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#f0b429,#d99a14);
         border-radius:9px;color:#050a14;font-weight:700;font-size:13px;text-decoration:none}
    .footer{margin-top:20px;font-size:12px;color:#334155}
    .footer a{color:#475569;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Aboneliğiniz Onaylandı!</h1>
  <p>Her sabah günlük piyasa raporu emailinize gönderilecek.<br>
     İptal etmek için emaildeki "abonelikten çık" linkini kullanabilirsiniz.</p>
  <a href="/dashboard" class="btn">Panele Git →</a>
  <div class="footer">
    <a href="/">3nfinans.com</a>
  </div>
</div>
</body>
</html>
