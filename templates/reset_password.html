<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3N Finans — Şifre Sıfırla</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050a14;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:rgba(8,14,28,.95);border:1px solid rgba(240,180,41,.18);
          border-radius:18px;padding:44px 52px;width:min(420px,calc(100% - 20px));
          box-shadow:0 24px 64px rgba(0,0,0,.55)}
    @media(max-width:480px){.card{padding:34px 24px}}
    .logo{text-align:center;margin-bottom:6px}
    .logo-3n{font-size:44px;font-weight:900;color:#f0b429;line-height:1;letter-spacing:-2px}
    .logo-finans{font-size:12px;font-weight:300;letter-spacing:8px;color:#94a3b8;text-transform:uppercase;margin-top:4px}
    .divider{width:50px;height:2px;background:linear-gradient(90deg,transparent,#f0b429,transparent);margin:16px auto 12px}
    .subtitle{text-align:center;font-size:11px;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px}
    .form-group{margin-bottom:13px}
    .form-group label{display:block;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:#475569;margin-bottom:6px}
    .form-group input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
                      border-radius:9px;padding:12px 14px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color .2s}
    .form-group input:focus{border-color:rgba(240,180,41,.45);box-shadow:0 0 0 3px rgba(240,180,41,.1)}
    .code-input{font-family:monospace;letter-spacing:6px;font-size:20px !important;text-align:center}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,#f0b429,#d99a14);border:none;
         border-radius:9px;color:#050a14;font-size:13px;font-weight:800;letter-spacing:1.5px;
         text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:6px}
    .btn:hover{opacity:.9;transform:translateY(-1px)}
    .error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
               border-radius:8px;padding:10px 14px;color:#ef4444;font-size:13px;text-align:center;margin-top:12px}
    .footer{text-align:center;margin-top:20px;font-size:12px;color:#475569}
    .footer a{color:#f0b429;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-3n">3N</div>
    <div class="logo-finans">Finans</div>
  </div>
  <div class="divider"></div>
  <div class="subtitle">Yeni Şifre Belirle</div>

  <form method="POST">
    <div class="form-group">
      <label>Email Adresi</label>
      <input type="email" name="email" placeholder="kayitli@email.com" required>
    </div>
    <div class="form-group">
      <label>Sıfırlama Kodu (6 haneli)</label>
      <input type="text" name="code" class="code-input" placeholder="000000"
             maxlength="6" pattern="\d{6}" required autofocus>
    </div>
    <div class="form-group">
      <label>Yeni Şifre</label>
      <input type="password" name="password" placeholder="En az 6 karakter" required minlength="6">
    </div>
    <div class="form-group">
      <label>Şifre Tekrar</label>
      <input type="password" name="password2" placeholder="Şifrenizi tekrar girin" required>
    </div>
    <button type="submit" class="btn">Şifremi Sıfırla</button>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
  </form>

  <div class="footer">
    <a href="/forgot-password">← Yeni kod gönder</a>
    &nbsp;·&nbsp;
    <a href="/login">Giriş Yap</a>
  </div>
</div>
</body>
</html>
