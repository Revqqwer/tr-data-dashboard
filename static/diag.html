<!doctype html><html lang="tr" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>diag</title><style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* iOS Safari, genis metin bloklarindaki yazilari otomatik buyutur
   ("text autosizing"). Bu, rapor gibi uzun metinlerde duzeni ekrandan
   genis yapip yatay tasmaya ve sagin kesilmesine yol aciyordu.
   %100 = tarayici olceklendirmeyi degistirmesin. */
html {
  -webkit-text-size-adjust: 100%;
  -moz-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

:root {
  --bg: #eef2f8;
  --surface: #ffffff;
  --surface2: #f4f6fb;
  --border: #d8e0ef;
  --text: #1a2340;
  --text-secondary: #52647a;
  --text-muted: #6b7a99;
  --blue: #3b7ef8;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  /* Sidebar stays dark */
  --sb-bg: #1e2538;
  --sb-surface: #273049;
  --sb-border: #3a4a6a;
  --sb-text: #edf0f8;
  --sb-muted: #8fa3c0;
  --sidebar-w: 220px;
  color-scheme: light;
}

/* ── Koyu tema ── (data-theme="dark" <html> üzerinde) */
:root[data-theme="dark"] {
  --bg: #0b0f17;
  --surface: #141a24;
  --surface2: #1b222e;
  --border: #2a3340;
  --text: #e6edf5;
  --text-secondary: #aeb9c7;
  --text-muted: #7f8b9c;
  --blue: #5b8cff;
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  /* Sidebar zaten koyu — koyu temada biraz daha derin ton */
  --sb-bg: #0e131c;
  --sb-surface: #1a2130;
  --sb-border: #2a3340;
  --sb-text: #e6edf5;
  --sb-muted: #8493a8;
  color-scheme: dark;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  font-size: 14px;
}

/* ── Sidebar (dark) ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sb-bg);
  border-right: 1px solid var(--sb-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: width 0.25s ease;
  overflow: hidden;
}

/* ── Sidebar collapse ── */
body.sidebar-collapsed .sidebar { width: 0 !important; border-right: none; }
body.sidebar-collapsed .main    { margin-left: 0 !important; }
body.no-sb-transition .sidebar,
body.no-sb-transition .main,
body.no-sb-transition .sb-toggle-btn { transition: none !important; }

/* ── Sidebar toggle button (follows sidebar edge) ── */
.sb-toggle-btn {
  position: fixed;
  top: 18px;
  left: calc(var(--sidebar-w) - 14px);
  width: 28px; height: 28px;
  background: var(--sb-bg);
  border: 1.5px solid var(--sb-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 200;
  color: var(--sb-muted);
  transition: left 0.25s ease, background 0.15s, color 0.15s, transform 0.25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.sb-toggle-btn:hover { background: var(--sb-surface); color: var(--sb-text); }
.sb-toggle-btn svg   { width: 13px; height: 13px; flex-shrink: 0; transition: transform 0.25s; }
body.sidebar-collapsed .sb-toggle-btn { left: 8px; }
body.sidebar-collapsed .sb-toggle-btn svg { transform: rotate(180deg); }
.sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--sb-border); }
.logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--sb-text); }
.logo-accent { color: #6ba3ff; }
.sidebar-nav { padding: 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.nav-section { margin-top: 8px; }
.nav-section-title {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--sb-muted);
  text-decoration: none;
  cursor: pointer; user-select: none;
  transition: background 0.15s, color 0.15s;
}
.nav-section-title:hover { background: var(--sb-surface); color: var(--sb-text); }
.nav-section-title svg { width: 14px; height: 14px; flex-shrink: 0; transition: transform 0.2s; }
.nav-section-title.collapsed svg { transform: rotate(-90deg); }
.nav-section-items { display: flex; flex-direction: column; gap: 2px; }
.nav-section-items.collapsed { display: none; }
.nav-section-items .nav-item { padding-left: 20px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  color: var(--sb-muted); text-decoration: none;
  font-size: 13px; font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-item:hover:not(.disabled) { background: var(--sb-surface); color: var(--sb-text); }
.nav-item.active { background: rgba(107,163,255,0.15); color: #6ba3ff; }
.nav-item.disabled { opacity: 0.35; cursor: not-allowed; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--sb-border); font-size: 11px; color: var(--sb-muted); }

/* ── Tema geçiş düğmesi (sidebar altı) ── */
.sb-theme-row { padding: 10px 12px 4px; }
.sb-theme-toggle {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: 9px; cursor: pointer;
  background: var(--sb-surface); border: 1px solid var(--sb-border);
  color: var(--sb-text); font-size: 12.5px; font-weight: 500;
  transition: background .15s, border-color .15s;
}
.sb-theme-toggle:hover { background: rgba(107,163,255,0.15); border-color: #6ba3ff; }
.sb-theme-ic { font-size: 14px; line-height: 1; }

/* ── Main ── */
/* min-width:0 SART: body flex kabi, .main flex ogesi. Varsayilan min-width:auto
   ile .main icerigin min-content genisliginin altina inemez; iceride tek bir
   white-space:nowrap baslik bile sayfayi ekrandan genis yapip yatay tasmaya
   yol acar (iOS Safari'de bu zincir kirilmiyor). */
.main { margin-left: var(--sidebar-w); flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 100vh; transition: margin-left 0.25s ease; }

/* ── Topbar (light) ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 50;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.topbar h1 { font-size: 17px; font-weight: 700; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; display: block; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.range-select {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 7px 12px; border-radius: 8px;
  font-size: 13px; cursor: pointer; outline: none;
}
.refresh-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--blue); color: #fff; border: none;
  padding: 7px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
}
.refresh-btn:hover { opacity: 0.85; }

/* ── Loading ── */
.loading-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: var(--text-muted); min-height: 400px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }

/* ── GridStack ── */
.grid-stack { padding: 16px; background: transparent; }
.grid-stack-item-content { inset: 6px !important; }

/* ── Chart Card (white) ── */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.chart-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-color: #c4d0e8; }

/* ── Chart header: drag handle ── */
.chart-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  cursor: grab; user-select: none; flex-shrink: 0;
}
.chart-header:active { cursor: grabbing; }
.chart-header h2 { font-size: 14px; font-weight: 600; color: var(--text); }

.header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); transition: opacity 0.15s; }
.toggle-legend { cursor: pointer; }
.toggle-legend:hover { color: var(--text); }
.dot { width: 9px; height: 9px; border-radius: 50%; }

/* ── Chart wrap ── */
.chart-wrap { position: relative; flex: 1; min-height: 80px; }
.chart-wrap canvas { position: absolute; inset: 0; }

/* ── Toggle group ── */
.toggle-group { display: flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
.toggle-btn {
  padding: 4px 11px; font-size: 12px; font-weight: 500;
  background: transparent; border: none; color: var(--text-muted);
  cursor: pointer; transition: background 0.15s, color 0.15s;
}
.toggle-btn:hover { background: var(--surface2); color: var(--text); }
.toggle-btn.active { background: var(--blue); color: #fff; }

/* ── Date input ── */
.date-input-wrap { display: flex; align-items: center; gap: 8px; }
.date-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.date-input {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 10px; border-radius: 8px;
  font-size: 12px; font-family: 'Inter', sans-serif;
  cursor: pointer; outline: none;
}
.date-input:focus { border-color: var(--blue); }

/* ── GridStack placeholder ── */
.grid-stack-placeholder > .placeholder-content {
  border: 2px dashed var(--blue) !important;
  background: rgba(59,126,248,0.05) !important;
  border-radius: 12px;
}

/* ── Tablo Kartı ── */
.chart-card.table-card { height: 100%; }
.chart-card.table-card #makroTableWrap { flex: 1; overflow: auto; min-height: 0; }
.table-card .butce-table-wrap { flex: none; }

.butce-table-wrap {
  overflow: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.butce-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  white-space: nowrap;
}
.butce-table thead th {
  background: var(--surface2);
  color: var(--text-muted);
  font-weight: 600;
  padding: 7px 12px;
  text-align: right;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 2;
}
.butce-table thead th:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  z-index: 3;
  background: var(--surface2);
}
.butce-table thead th:last-child { background: #eef3ff; color: var(--blue); }
.butce-table tbody td {
  padding: 5px 12px;
  text-align: right;
  border-bottom: 1px solid #f0f4fb;
  color: var(--text-muted);
}
.butce-table tbody td:first-child {
  text-align: left;
  font-weight: 600;
  color: var(--text);
  position: sticky;
  left: 0;
  background: var(--surface);
  z-index: 1;
  border-right: 1px solid var(--border);
}
.butce-table tbody td:last-child { font-weight: 600; }
.butce-table tbody tr:hover td { background: #f5f8ff; }
.butce-table tbody tr:hover td:first-child { background: #f5f8ff; }
.cell-pos { color: #059669 !important; }
.cell-neg { color: #dc2626 !important; }
.cell-empty { color: #c0c8d8 !important; }

/* ── BoP (Ödemeler Dengesi) Tablosu ── */
.bop-wrap {
  overflow: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
  max-height: 100%;
}
.bop-table {
  border-collapse: collapse;
  font-size: 11.5px;
  white-space: nowrap;
  min-width: 100%;
}
/* Grup satırı */
.bop-table thead tr.bop-group-row th {
  padding: 7px 12px;
  text-align: center;
  font-weight: 700;
  font-size: 11px;
  border-bottom: 1px solid rgba(0,0,0,0.12);
  position: sticky;
  top: 0;
  z-index: 4;
}
/* Alt başlık satırı */
.bop-table thead tr.bop-sub-row th {
  padding: 5px 10px;
  text-align: right;
  font-weight: 600;
  font-size: 10.5px;
  color: var(--text-muted);
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 30px;
  z-index: 3;
}
/* Grup renkleri — başlık */
.bop-g-cari    { background: rgba(16,185,129,0.22); color: #064e3b; }
.bop-g-sermaye { background: rgba(245,158,11,0.22); color: #78350f; }
.bop-g-nethata { background: rgba(239,68,68,0.22);  color: #7f1d1d; }
.bop-g-finans  { background: rgba(59,126,248,0.22); color: #1e3a8a; }
/* Grup renkleri — alt başlık */
.bop-c-cari    { background: rgba(16,185,129,0.07); }
.bop-c-sermaye { background: rgba(245,158,11,0.07); }
.bop-c-nethata { background: rgba(239,68,68,0.07);  }
.bop-c-finans  { background: rgba(59,126,248,0.07); }
/* Tarih sütunu */
.bop-table .bop-date-hd {
  text-align: left !important;
  position: sticky;
  left: 0; z-index: 5;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  min-width: 72px;
}
/* Gövde hücresi */
.bop-table tbody td {
  padding: 4px 10px;
  text-align: right;
  border-bottom: 1px solid #f0f4fb;
}
.bop-table tbody td.bop-date {
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  color: var(--text);
  position: sticky;
  left: 0; z-index: 1;
  background: var(--surface);
  border-right: 1px solid var(--border);
}
/* Ana kalem hücreleri (Toplam) — koyu */
.bop-table tbody td.bop-main { font-weight: 700; }
/* Satır hover */
.bop-table tbody tr:hover td            { background: #f5f8ff; }
.bop-table tbody tr:hover td.bop-date  { background: #f5f8ff; }
.cell-zero { color: var(--text-muted) !important; }

/* ── Source Note Card ── */
.source-note-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 11px;
  line-height: 1.65;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.source-note-card strong {
  color: var(--text);
  font-weight: 600;
  margin-right: 4px;
}
.source-note-card code {
  background: rgba(59,126,248,0.09);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: 'SF Mono', 'Consolas', monospace;
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.2px;
}

/* ── GridStack resize handles ── */
.ui-resizable-handle { opacity: 0; transition: opacity 0.2s; }
.grid-stack-item:hover .ui-resizable-handle { opacity: 1; }
.ui-resizable-se, .ui-resizable-sw,
.ui-resizable-ne, .ui-resizable-nw {
  width: 12px !important; height: 12px !important;
  background: var(--blue) !important;
  border-radius: 50% !important;
  opacity: 0;
}
.grid-stack-item:hover .ui-resizable-se,
.grid-stack-item:hover .ui-resizable-sw,
.grid-stack-item:hover .ui-resizable-ne,
.grid-stack-item:hover .ui-resizable-nw { opacity: 0.6; }

/* ── Enflasyon Katkı Tablosu ── */
.enf-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  white-space: nowrap;
}
.enf-table thead th {
  background: var(--surface2);
  color: var(--text-muted);
  font-weight: 600;
  padding: 7px 14px;
  text-align: right;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 2;
}
.enf-table thead th:first-child,
.enf-table thead th:nth-child(2) {
  text-align: left;
}
.enf-table thead th.enf-th-mom { background: rgba(59,126,248,0.07); color: var(--blue); }
.enf-table thead th.enf-th-katki { background: rgba(16,185,129,0.07); color: var(--green); }
.enf-table tbody td {
  padding: 6px 14px;
  text-align: right;
  border-bottom: 1px solid #f0f4fb;
}
.enf-table tbody td:first-child { text-align: center; font-weight: 600; color: var(--text-muted); font-size: 11px; }
.enf-table tbody td:nth-child(2) { text-align: left; font-weight: 500; color: var(--text); }
.enf-table tbody td:nth-child(3) { text-align: right; color: var(--text-muted); font-size: 11px; }
.enf-table tbody tr.enf-genel td { background: var(--surface2); font-weight: 700; }
.enf-table tbody tr.enf-genel td:nth-child(2) { font-size: 13px; }
.enf-table tbody tr:hover td { background: var(--surface2); }
.enf-table tbody tr.enf-genel:hover td { background: var(--surface2); }
.enf-bar-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.enf-bar {
  height: 8px; border-radius: 4px;
  flex-shrink: 0;
  min-width: 2px;
}
.enf-bar-pos { background: var(--green); }
.enf-bar-neg { background: var(--red); }

/* ── Enflasyon Tarihsel Tablo ── */
.enf-hist-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 11.5px;
  white-space: nowrap;
}
.enf-hist-table thead th {
  background: var(--surface2);
  color: var(--text-muted);
  font-weight: 600;
  padding: 6px 10px;
  text-align: right;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 2;
  writing-mode: horizontal-tb;
}
.enf-hist-table thead th:first-child  { text-align: left; min-width: 68px; }
.enf-hist-table thead th:nth-child(2) { background: #eef3ff; color: var(--blue); font-size: 11px; }
.enf-hist-table tbody td {
  padding: 4px 10px;
  text-align: right;
  border-bottom: 1px solid #f0f4fb;
  font-variant-numeric: tabular-nums;
}
.enf-hist-table tbody td:first-child  { text-align: left; font-weight: 500; color: var(--text); position: sticky; left: 0; background: var(--surface); z-index: 1; border-right: 1px solid var(--border); }
.enf-hist-table tbody td:nth-child(2) { font-weight: 700; }
.enf-hist-table tbody tr:hover td     { filter: brightness(0.96); }
.enf-hist-table tbody tr:hover td:first-child { background: #f5f8ff; }

/* ── Makro Tahmin Tablosu ── */
.makro-tbl {
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
  width: 100%;
}
.makro-tbl th {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--sb-bg);
  color: var(--sb-text);
  font-size: 11px;
  font-weight: 600;
  padding: 7px 10px;
  text-align: right;
  border-bottom: 2px solid var(--sb-border);
  border-right: 1px solid var(--sb-border);
}
.makro-tbl th:first-child { text-align: left; position: sticky; left: 0; z-index: 8; min-width: 72px; }
.makro-tbl td {
  padding: 4px 9px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid #e8edf5;
  font-variant-numeric: tabular-nums;
}
.makro-tbl td:first-child {
  text-align: left;
  font-weight: 500;
  position: sticky;
  left: 0;
  z-index: 3;
  background: var(--surface);
  border-right: 1px solid var(--border);
}
.makro-tbl .hist-row td { background: var(--surface); }
.makro-tbl .hist-row:hover td { background: var(--surface2); }
.makro-tbl .hist-row:hover td:first-child { background: var(--surface2); }
.makro-tbl .fc-row td { background: rgba(245,158,11,.10); }
.makro-tbl .fc-row:hover td { background: #fef9c3; }
.makro-tbl .fc-row td:first-child { background: #fef9c3; }
.makro-tbl .fc-row:hover td:first-child { background: #fde68a; }
.makro-divider td {
  text-align: center !important;
  background: #f97316 !important;
  color: #fff !important;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 5px !important;
  border: none;
  position: sticky;
  left: 0;
}
.makro-tbl .positive { color: #059669; font-weight: 500; }
.makro-tbl .negative { color: #dc2626; font-weight: 500; }
.makro-input {
  width: 100%;
  min-width: 52px;
  background: transparent;
  border: none;
  border-radius: 3px;
  font-size: 12px;
  font-family: inherit;
  text-align: right;
  color: var(--text);
  outline: none;
  padding: 1px 2px;
}
.makro-input:focus { background: rgba(59,126,248,0.10); }
.makro-input.note-input { text-align: left; min-width: 100px; }
.makro-input[type="number"] { -moz-appearance: textfield; }
.makro-input[type="number"]::-webkit-inner-spin-button,
.makro-input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ══════════════════════════════════════════════
   SIDEBAR USER AREA
   ══════════════════════════════════════════════ */
.sidebar-footer { padding: 12px 16px 14px; border-top: 1px solid var(--sb-border); }
.sb-user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.sb-user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #6ba3ff, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
}
.sb-user-info { overflow: hidden; }
.sb-user-name { font-size: 13px; font-weight: 600; color: var(--sb-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-sub  { font-size: 11px; color: var(--sb-muted); }
.sb-user-actions { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.sb-link { color: var(--sb-muted); text-decoration: none; font-weight: 500; transition: color .15s; }
.sb-link:hover { color: var(--sb-text); }
.sb-link-red { color: #f87171; }
.sb-link-red:hover { color: #ef4444; }
.sb-sep { color: var(--sb-border); }


/* ═══════════════════════════════════════════════════════
   MOBİL UYUM
   ═══════════════════════════════════════════════════════ */
#mobile-menu-btn { display: none; }
.sidebar-overlay { display: none; }

@media (max-width: 768px) {
  /* Sidebar → soldan açılan çekmece */
  .sidebar {
    width: 264px !important;
    transform: translateX(-100%);
    transition: transform 0.28s ease;
    box-shadow: 2px 0 18px rgba(0,0,0,0.4);
    border-right: 1px solid var(--sb-border);
  }
  .sidebar.mobile-open { transform: translateX(0); }
  body.sidebar-collapsed .sidebar { width: 264px !important; }

  /* İçerik tam genişlik */
  .main,
  body.sidebar-collapsed .main { margin-left: 0 !important; }

  /* Masaüstü kenar-toggle gizli; hamburger görünür */
  .sb-toggle-btn { display: none !important; }
  #mobile-menu-btn {
    display: flex; align-items: center; justify-content: center;
    position: fixed; top: 11px; left: 12px; z-index: 300;
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--sb-bg); color: var(--sb-text);
    border: 1px solid var(--sb-border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); cursor: pointer;
  }

  /* Karartma katmanı */
  .sidebar-overlay {
    display: block; position: fixed; inset: 0; z-index: 90;
    background: rgba(0,0,0,0.45);
    opacity: 0; pointer-events: none; transition: opacity 0.28s ease;
  }
  .sidebar-overlay.visible { opacity: 1; pointer-events: auto; }

  /* Topbar — hamburger'a yer aç */
  .topbar { padding: 12px 14px 12px 62px; }
  .topbar h1 { font-size: 15px; }
  .topbar-sub { font-size: 11px; }
  .topbar-actions { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .range-select, .refresh-btn { padding: 6px 10px; font-size: 12px; }

  /* GridStack + kartlar — dolguları küçült */
  .grid-stack { padding: 8px; }
  .chart-card { padding: 12px 14px; }
  .chart-header h2 { font-size: 13px; }

  /* Sürükle-boyutlandır tutamaçlarını dokunmatikte kapat */
  .ui-resizable-handle { display: none !important; }

  /* Geniş tablolarda dokunmatik yatay kaydırma */
  .butce-table-wrap, .bop-wrap, #makroTableWrap,
  .chart-card.table-card { -webkit-overflow-scrolling: touch; }
}

@media (max-width: 480px) {
  .topbar h1 { font-size: 14px; }
  .topbar-sub { display: none; }
  .chart-card { padding: 10px 12px; }
  .grid-stack { padding: 6px; }
}

function _mbTwoCol(raw) {
  const lines = raw.split('\n');
  const sections = [];
  let buf = [];

  for (const line of lines) {
    const t = line.trim();
    if (/^━+/.test(t) && t.replace(/━+/g, '').trim()) {
      if (buf.length) sections.push(buf.join('\n'));
      buf = [line];
    } else {
      buf.push(line);
    }
  }
  if (buf.length) sections.push(buf.join('\n'));

  const colStyle = 'font-size:16.5px;line-height:1.95;color:var(--text);min-width:0;';

  if (sections.length < 3) {
    return `<div style="${colStyle}">${_mbFormat(raw)}</div>`;
  }

  // sections[0] = başlık + giriş metni (━━━ öncesi) → tam genişlik
  const preamble = sections[0];
  const rest = sections.slice(1);

  // Karakter sayısına göre en dengeli bölme noktasını bul
  const total = rest.reduce((s, x) => s + x.length, 0);
  let splitAt = 1, bestDiff = Infinity, cum = 0;
  for (let i = 0; i < rest.length - 1; i++) {
    cum += rest[i].length;
    const diff = Math.abs(cum - (total - cum));
    if (diff < bestDiff) { bestDiff = diff; splitAt = i + 1; }
  }

  const leftRaw  = rest.slice(0, splitAt).join('\n');
  const rightRaw = rest.slice(splitAt).join('\n');

  const preHtml = preamble.trim()
    ? `<div style="${colStyle};margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);">${_mbFormat(preamble)}</div>`
    : '';

  return `${preHtml}<div class="mb-report-cols" style="display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;">
    <div style="${colStyle}">${_mbFormat(leftRaw)}</div>
    <div style="${colStyle}">${_mbFormat(rightRaw)}</div>
  </div>`;
}
function _mbFormat(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const lines = raw.split('\n');
  let html = '';
  let inBox = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const t = line.trim();

    if (!t) {
      if (inBox) continue;
      html += '<div style="height:8px"></div>';
      continue;
    }

    // Ana başlık: 📊 GÜNLÜK / 📋 HAFTALIK
    if (/^(📊|📋)\s/.test(t)) {
      html += `<div style="font-size:16px;font-weight:800;color:var(--text);margin:0 0 16px;letter-spacing:-.3px;">${esc(t)}</div>`;
      continue;
    }

    // Bölüm başlığı: ━━━ ... ━━━
    if (/^━+/.test(t)) {
      const label = t.replace(/━+/g,'').trim();
      if (label) {
        html += `<div class="mb-sec" style="margin:22px -24px 12px;padding:8px 24px;background:rgba(59,130,246,.07);border-top:1px solid rgba(59,130,246,.18);border-bottom:1px solid rgba(59,130,246,.18);">
          <div style="display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text);">
            <span style="display:block;width:3px;height:15px;background:var(--blue);border-radius:2px;flex-shrink:0;"></span>
            ${esc(label)}
          </div>
        </div>`;
      } else {
        html += `<div style="height:1px;background:var(--border);margin:16px 0"></div>`;
      }
      continue;
    }

    // Kutu başlığı: ┌─ POZİSYON FIRSATLARI ─...
    if (/^┌/.test(t)) {
      inBox = true;
      const label = t.replace(/[┌─└┘│]+/g,'').trim();
      html += `<div style="margin:12px 0 0;border:1px solid rgba(59,130,246,.3);border-radius:8px;overflow:hidden;">
        <div style="background:rgba(59,130,246,.08);padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--blue);">${esc(label) || 'POZİSYON FIRSATLARI'}</div>
        <div style="padding:10px 14px;">`;
      continue;
    }
    // Kutu alt çizgisi: └───
    if (/^└/.test(t)) {
      inBox = false;
      html += `</div></div>`;
      continue;
    }
    // Kutu içi satır: │ ...
    if (/^│/.test(t)) {
      const content = t.replace(/^│\s*/,'');
      if (content) html += `<div style="font-size:14.5px;font-weight:600;color:var(--text);padding:2px 0;">${_mbInline(esc(content))}</div>`;
      continue;
    }

    // Numaralı liste: 1. 2. ...
    if (/^\d+\./.test(t)) {
      const num = t.match(/^(\d+)\./)[1];
      const rest = t.replace(/^\d+\.\s*/,'');
      html += `<div style="display:flex;gap:10px;margin:6px 0;padding:9px 13px;background:var(--surface2);border-radius:7px;border-left:3px solid var(--blue);">
        <span style="font-size:13.5px;font-weight:700;color:var(--blue);min-width:18px;padding-top:1px;">${num}.</span>
        <span style="font-size:14.5px;color:var(--text);">${_mbInline(esc(rest))}</span>
      </div>`;
      continue;
    }

    // Bullet: • veya -
    if (/^[•\-]\s/.test(t)) {
      const rest = t.replace(/^[•\-]\s*/,'');
